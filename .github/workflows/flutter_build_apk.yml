name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter SDK (3.13.0)
        run: |
          set -e
          FLUTTER_VERSION=3.13.0
          echo "Downloading Flutter $FLUTTER_VERSION..."
          if command -v wget >/dev/null 2>&1; then
            wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz -O flutter.tar.xz || exit 1
          else
            curl -sSL https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_${FLUTTER_VERSION}-stable.tar.xz -o flutter.tar.xz || exit 1
          fi
          mkdir -p $HOME/flutter
          tar -xf flutter.tar.xz -C $HOME
          echo "PATH=$HOME/flutter/bin:$PATH" >> $GITHUB_ENV

      - name: Verify Flutter
        run: |
          flutter --version
          flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        env:
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: |
          flutter build apk --release --dart-define=WEATHER_API_KEY=$WEATHER_API_KEY

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-hydration-apk
          path: build/app/outputs/flutter-apk/app-release.apk
